<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Darker orange diagonal stripes — thinner, shorter dashes, offset, slower -->
    <pattern id="p1" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="translate(20, 0)">
      <line x1="20" y1="20" x2="60" y2="60" stroke="rgba(210, 88, 36, 0.07)" stroke-width="18" stroke-linecap="round"/>
      <animateTransform attributeName="patternTransform" type="translate" values="20 0;100 80" dur="16s" repeatCount="indefinite"/>
    </pattern>
    <!-- Lighter warm orange — larger stripes -->
    <pattern id="p2" width="96" height="96" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="96" y2="96" stroke="rgba(248, 148, 76, 0.06)" stroke-width="30" stroke-linecap="round"/>
      <animateTransform attributeName="patternTransform" type="translate" values="0 0;96 96" dur="7s" repeatCount="indefinite"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#p1)"/>
  <rect width="512" height="512" fill="url(#p2)"/>
</svg>
